server:
  port: 8080

spring:
  cloud:
    gateway:
      default-filters:
        # 1. Évite le bug du "Double CORS" si le backend renvoie déjà les en-têtes
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        # 2. Indispensable pour que la Gateway réponde correctement aux requêtes OPTIONS de SockJS
        add-to-simple-url-handler-mapping: true 
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Route pour les requêtes REST classiques
        - id: messaging-rest
          uri: http://messaging-service:8083
          predicates:
            - Path=/api/messages/**
        
        # 2. Route pour le WebSocket (SockJS)
        - id: messaging-ws
          uri: http://messaging-service:8083
          predicates:
            - Path=/ws/**