server:
  port: 8080

spring:
  cloud:
    gateway:
      # 1. On configure le CORS globalement pour autoriser n'importe quel client (idéal pour le dev local)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # Route pour les requêtes REST classiques
        - id: messaging-rest
          uri: http://messaging-service:8083
          predicates:
            - Path=/api/messages/**
        
        # 2. Route pour le WebSocket (SockJS)
        # On utilise "http://" au lieu de "ws://". Spring Cloud Gateway est assez
        # intelligent pour gérer la requête HTTP /info de SockJS, puis "upgrader"
        # la connexion en vrai WebSocket automatiquement !
        - id: messaging-ws
          uri: http://messaging-service:8083
          predicates:
            - Path=/ws/**